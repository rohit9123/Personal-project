server:
  http_listen_port: 3200   # Grafana queries Tempo on this port

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # OTel Collector pushes spans here

storage:
  trace:
    backend: local              # local disk — fine for demo; use GCS/S3 in prod
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# NOTE: without a compactor block, Tempo never expires old traces.
# For a long-running demo add:
#
#   compactor:
#     compaction:
#       block_retention: 24h   # delete traces older than 24 hours
