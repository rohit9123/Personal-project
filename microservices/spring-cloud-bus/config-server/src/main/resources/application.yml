spring:
  application:
    name: config-server
  profiles:
    active: native          # 'native' = serve config files from the local filesystem
                            # The config-repo/ directory has no .git, so we MUST use native.
                            # Without this profile, Config Server tries to clone a Git repo
                            # and fails with an unhelpful error.
  cloud:
    config:
      server:
        native:
          # IMPORTANT: file: paths are relative to the JVM working directory (CWD),
          # NOT the JAR location. Run 'mvn spring-boot:run' from inside config-server/
          # so that ../config-repo resolves to spring-cloud-bus/config-repo/.
          # If running the packaged JAR: java -jar target/config-server-*.jar
          # from inside config-server/, the same path works.
          search-locations: file:../config-repo
    bus:
      enabled: true          # explicit — already true by default when starter is present

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${RABBITMQ_PASSWORD:guest}
    # In production: set RABBITMQ_PASSWORD env var or use a secrets manager.
    # 'guest' is the RabbitMQ default — fine for local dev, never for production.

server:
  port: 8888                 # convention: Config Server always on 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"   # exposes /actuator/busrefresh — the key endpoint for this demo.
                       # In production, lock this down: include: "health,info,busrefresh"
  endpoint:
    health:
      show-details: always
