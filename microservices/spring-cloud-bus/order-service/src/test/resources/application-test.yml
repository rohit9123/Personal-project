# Test profile — disables Config Server import and Bus so tests run without
# RabbitMQ or a running Config Server.
spring:
  cloud:
    config:
      enabled: false
    bus:
      enabled: false
  config:
    import: "optional:configserver:"   # suppress mandatory configserver import

# Provide properties the app expects (normally served by Config Server)
order:
  greeting: "test greeting"
  max-items: 5
