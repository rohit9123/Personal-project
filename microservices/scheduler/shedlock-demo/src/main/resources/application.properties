spring.application.name=shedlock-demo

# -----------------------------------------------------------------------
# H2 file-based DB so the shedlock table persists between restarts.
# Run two instances on different ports sharing the same file to see
# that only one acquires the lock per trigger.
#
# Instance 1 (default): mvn spring-boot:run
# Instance 2:           mvn spring-boot:run -Dspring-boot.run.arguments=--server.port=8081
# -----------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/shedlock-demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create the shedlock table on every startup (IF NOT EXISTS makes it idempotent)
spring.sql.init.mode=always

# H2 console — open http://localhost:8080/h2-console
# JDBC URL to enter in console: jdbc:h2:file:./data/shedlock-demo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow console access from any host (needed when running multiple instances)
spring.h2.console.settings.web-allow-others=true

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.example.shedlock=INFO
# ShedLock internal messages (set to DEBUG to see the INSERT→UPDATE flow)
logging.level.net.javacrumbs.shedlock=INFO
