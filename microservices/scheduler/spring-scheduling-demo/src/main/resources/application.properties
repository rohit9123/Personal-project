# Application name
spring.application.name=spring-scheduling-demo

# ------------------------------------------------------------------
# Scheduler tuning — externalise cron / delay values so you can
# change the schedule without recompiling.
# ------------------------------------------------------------------

# Fixed-rate tasks
app.scheduler.metrics-rate-ms=5000

# Fixed-delay tasks
app.scheduler.cleanup-delay-ms=8000

# Cron task — every minute at second 0
app.scheduler.report-cron=0 * * * * *

# ------------------------------------------------------------------
# Reduce Spring Boot banner noise for demo clarity
# ------------------------------------------------------------------
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.example.scheduler=INFO
